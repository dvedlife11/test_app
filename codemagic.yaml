workflows:
  ios-testflight:
    name: iOS TestFlight Upload
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: 3.7.12
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        BUNDLE_ID: com.thebone.test
      groups:
        - app_store_connect
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
        - pattern: "local"
          include: true
          source: true
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Precache iOS artifacts
        script: flutter precache --ios
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..
      - name: Set up keychain and import certificate
        script: |
          keychain initialize
          echo $BUILD_CERTIFICATE_BASE64 | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $P12_PASSWORD
      - name: Set up provisioning profile
        script: |
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"
          mkdir -p "$(dirname "$PROFILE_PATH")"
          echo $BUILD_PROVISION_PROFILE_BASE64 | base64 --decode > "$PROFILE_PATH"
      - name: Generate export options plist
        script: |
          cat > $HOME/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>S2U8DTP342</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY_P8
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
