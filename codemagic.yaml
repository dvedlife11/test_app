workflows:
  ios-testflight:
    name: iOS TestFlight Upload
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: 3.7.12
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        BUNDLE_ID: com.thebone.test
      groups:
        - app_store
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
        - pattern: "local"
          include: true
          source: true
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Precache iOS artifacts
        script: flutter precache --ios
      - name: Inject privacy manifest for Flutter.framework
        script: |
          cp codemagic/PrivacyInfo.xcprivacy /tmp/PrivacyInfo.xcprivacy

          COUNT=0
          while IFS= read -r FRAMEWORK_DIR; do
            cp /tmp/PrivacyInfo.xcprivacy "$FRAMEWORK_DIR/PrivacyInfo.xcprivacy"
            COUNT=$((COUNT + 1))
            echo "Injected manifest into: $FRAMEWORK_DIR"
          done < <(find "$FLUTTER_ROOT/bin/cache/artifacts/engine" -type d -name "Flutter.framework")

          if [ "$COUNT" -eq 0 ]; then
            echo "No Flutter.framework directories found to patch"
            exit 1
          fi
      - name: Install CocoaPods
        script: |
          cd ios
           rm -rf Pods Podfile.lock
           pod install --repo-update
          cd ..
      - name: Set up keychain and import certificate
        script: |
          keychain initialize
          echo $BUILD_CERTIFICATE_BASE64 | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $P12_PASSWORD
      - name: Set up provisioning profile
        script: |
          RAW_PROFILE_PATH="/tmp/profile.mobileprovision"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo $BUILD_PROVISION_PROFILE_BASE64 | base64 --decode > "$RAW_PROFILE_PATH"

          security cms -D -i "$RAW_PROFILE_PATH" > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" /tmp/profile.plist)

          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          cp "$RAW_PROFILE_PATH" "$PROFILE_PATH"

          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "Profile app identifier: $APP_IDENTIFIER"

          EXPECTED_APP_IDENTIFIER="S2U8DTP342.com.thebone.test"
          if [ "$APP_IDENTIFIER" != "$EXPECTED_APP_IDENTIFIER" ]; then
            echo "Provisioning profile mismatch. Expected: $EXPECTED_APP_IDENTIFIER, got: $APP_IDENTIFIER"
            exit 1
          fi

          # Save profile name for use in next step
          echo "$PROFILE_NAME" > /tmp/profile_name.txt
      - name: Set up code signing and export options
        script: |
          xcode-project use-profiles
          PROFILE_NAME=$(cat /tmp/profile_name.txt)
          cp codemagic/export_options.template.plist /tmp/export_options.plist
          /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:com.thebone.test ${PROFILE_NAME}" /tmp/export_options.plist
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/tmp/export_options.plist
      - name: Inject privacy manifests and plist keys into built app
        script: |
          APP_PATH=$(find build/ios/archive -name "Runner.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "Runner.app" | head -1)
          fi
          echo "App path: $APP_PATH"
          PLIST="$APP_PATH/Info.plist"

          cp codemagic/PrivacyInfo.xcprivacy /tmp/PrivacyInfo.xcprivacy

          cp /tmp/PrivacyInfo.xcprivacy "$APP_PATH/PrivacyInfo.xcprivacy"

          FRAMEWORK_PATH="$APP_PATH/Frameworks/Flutter.framework"
          if [ -d "$FRAMEWORK_PATH" ]; then
            cp /tmp/PrivacyInfo.xcprivacy "$FRAMEWORK_PATH/PrivacyInfo.xcprivacy"
            echo "Injected manifest into $FRAMEWORK_PATH"
          else
            echo "WARNING: Flutter.framework not found in app bundle at $FRAMEWORK_PATH"
          fi

          SQFLITE_FRAMEWORK_PATH="$APP_PATH/Frameworks/sqflite.framework"
          if [ -d "$SQFLITE_FRAMEWORK_PATH" ]; then
            cp /tmp/PrivacyInfo.xcprivacy "$SQFLITE_FRAMEWORK_PATH/PrivacyInfo.xcprivacy"
            echo "Injected manifest into $SQFLITE_FRAMEWORK_PATH"
          else
            echo "ERROR: sqflite.framework not found in app bundle at $SQFLITE_FRAMEWORK_PATH"
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'This app uses the microphone so you can record your affirmation audio sessions.'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'This app uses the microphone so you can record your affirmation audio sessions.'" "$PLIST"

          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST" 2>/dev/null || true

          echo "Injected keys. Rebuilding IPA from patched archive..."
          xcodebuild -exportArchive \
            -archivePath $(find build/ios/archive -name "*.xcarchive" | head -1) \
            -exportPath /tmp/ipa_output \
            -exportOptionsPlist /tmp/export_options.plist
          cp /tmp/ipa_output/*.ipa build/ios/ipa/
      - name: Verify privacy manifest and NSMicrophoneUsageDescription in final IPA
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA file found"
            exit 1
          fi

          echo "IPA Path: $IPA_PATH"

          # Extract Info.plist from IPA
          TEMP_DIR=$(mktemp -d)
          unzip -q "$IPA_PATH" -d "$TEMP_DIR"
          INFO_PLIST="$TEMP_DIR/Payload/Runner.app/Info.plist"
          APP_MANIFEST="$TEMP_DIR/Payload/Runner.app/PrivacyInfo.xcprivacy"
          FLUTTER_MANIFEST="$TEMP_DIR/Payload/Runner.app/Frameworks/Flutter.framework/PrivacyInfo.xcprivacy"
          SQFLITE_MANIFEST="$TEMP_DIR/Payload/Runner.app/Frameworks/sqflite.framework/PrivacyInfo.xcprivacy"

          if [ ! -f "$INFO_PLIST" ]; then
            echo "ERROR: Info.plist not found in IPA"
            exit 1
          fi

          if [ ! -f "$APP_MANIFEST" ]; then
            echo "ERROR: PrivacyInfo.xcprivacy missing from Runner.app"
            exit 1
          fi

          if [ ! -f "$FLUTTER_MANIFEST" ]; then
            echo "ERROR: PrivacyInfo.xcprivacy missing from Flutter.framework"
            exit 1
          fi

          if [ ! -f "$SQFLITE_MANIFEST" ]; then
            echo "ERROR: PrivacyInfo.xcprivacy missing from sqflite.framework"
            exit 1
          fi

          echo "Checking NSUserDefaults privacy declaration in app manifest..."
          if ! grep -q "NSPrivacyAccessedAPICategoryUserDefaults" "$APP_MANIFEST"; then
            echo "ERROR: Runner.app manifest missing NSPrivacyAccessedAPICategoryUserDefaults"
            cat "$APP_MANIFEST"
            exit 1
          fi

          if ! grep -q "CA92.1" "$APP_MANIFEST"; then
            echo "ERROR: Runner.app manifest missing reason CA92.1"
            cat "$APP_MANIFEST"
            exit 1
          fi

          echo "Checking NSUserDefaults privacy declaration in Flutter.framework manifest..."
          if ! grep -q "NSPrivacyAccessedAPICategoryUserDefaults" "$FLUTTER_MANIFEST"; then
            echo "ERROR: Flutter.framework manifest missing NSPrivacyAccessedAPICategoryUserDefaults"
            cat "$FLUTTER_MANIFEST"
            exit 1
          fi

          if ! grep -q "CA92.1" "$FLUTTER_MANIFEST"; then
            echo "ERROR: Flutter.framework manifest missing reason CA92.1"
            cat "$FLUTTER_MANIFEST"
            exit 1
          fi

          echo "Checking NSUserDefaults privacy declaration in sqflite.framework manifest..."
          if ! grep -q "NSPrivacyAccessedAPICategoryUserDefaults" "$SQFLITE_MANIFEST"; then
            echo "ERROR: sqflite.framework manifest missing NSPrivacyAccessedAPICategoryUserDefaults"
            cat "$SQFLITE_MANIFEST"
            exit 1
          fi

          if ! grep -q "CA92.1" "$SQFLITE_MANIFEST"; then
            echo "ERROR: sqflite.framework manifest missing reason CA92.1"
            cat "$SQFLITE_MANIFEST"
            exit 1
          fi

          # Convert binary plist to XML so grep works
          plutil -convert xml1 "$INFO_PLIST"

          echo "NSMicrophoneUsageDescription check:"
          grep -A 1 "NSMicrophoneUsageDescription" "$INFO_PLIST" || echo "WARNING: NSMicrophoneUsageDescription NOT FOUND"

          if ! grep -q "NSMicrophoneUsageDescription" "$INFO_PLIST"; then
            echo "ERROR: NSMicrophoneUsageDescription missing from IPA Info.plist"
            echo "Full Info.plist:"
            cat "$INFO_PLIST"
            exit 1
          fi

          echo "✓ Privacy manifests and NSMicrophoneUsageDescription verified in final IPA"
          rm -rf "$TEMP_DIR"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - "**/*.ipa"
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY_P8
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
