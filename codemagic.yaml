workflows:
  ios-testflight:
    name: iOS TestFlight Upload
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: 3.7.12
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        BUNDLE_ID: com.thebone.test
      groups:
        - app_store
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "main"
          include: true
          source: true
        - pattern: "local"
          include: true
          source: true
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Precache iOS artifacts
        script: flutter precache --ios
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..
      - name: Set up keychain and import certificate
        script: |
          keychain initialize
          echo $BUILD_CERTIFICATE_BASE64 | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $P12_PASSWORD
      - name: Set up provisioning profile
        script: |
          RAW_PROFILE_PATH="/tmp/profile.mobileprovision"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo $BUILD_PROVISION_PROFILE_BASE64 | base64 --decode > "$RAW_PROFILE_PATH"

          security cms -D -i "$RAW_PROFILE_PATH" > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/profile.plist)
          APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" /tmp/profile.plist)

          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          cp "$RAW_PROFILE_PATH" "$PROFILE_PATH"

          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "Profile app identifier: $APP_IDENTIFIER"

          EXPECTED_APP_IDENTIFIER="S2U8DTP342.com.thebone.test"
          if [ "$APP_IDENTIFIER" != "$EXPECTED_APP_IDENTIFIER" ]; then
            echo "Provisioning profile mismatch. Expected: $EXPECTED_APP_IDENTIFIER, got: $APP_IDENTIFIER"
            exit 1
          fi

          # Save profile name for use in next step
          echo "$PROFILE_NAME" > /tmp/profile_name.txt
      - name: Generate export options plist
        script: |
          PROFILE_NAME=$(cat /tmp/profile_name.txt)
          cat > $HOME/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>S2U8DTP342</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.thebone.test</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY_P8
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
